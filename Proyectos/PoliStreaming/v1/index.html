<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PoliStreaming - Login</title>

    <!-- Enlace al CSS unificado -->
    <link rel="stylesheet" href="css/estilos.css">
</head>

<!-- IMPORTANTE: clase login-body -->
<body class="login-body">

    <!-- Contenedor del login -->
    <div class="login-container">

        <h2>PoliStreaming</h2>

        <!-- Campo usuario -->
        <input type="text" id="usuario" placeholder="Ingrese usuario">

        <!-- Campo contraseña -->
        <input type="password" id="password" placeholder="Ingrese contraseña">

        <!-- Boton que ejecuta login -->
        <button onclick="login()">Ingresar</button>

        <!-- Mensaje de error -->
        <p id="mensaje"></p>

    </div>

    <!-- Script -->
    <script src="js/login.js"></script>

</body>
</html>
