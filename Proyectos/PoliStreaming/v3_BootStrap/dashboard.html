<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/estilos.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<title>Dashboard</title>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
<span id="bienvenida"></span>
<button class="btn btn-danger" onclick="cerrarSesion()">Salir</button>
</nav>

<div class="container mt-4">
<div class="row">

<div class="col-md-4">
<div class="card p-3">
<h5>Cotizador</h5>
<select id="servicio"></select>
<input id="pantallas" type="number">
<select id="meses">
<option value="1">1</option>
<option value="3">3</option>
<option value="6">6</option>
</select>
<button onclick="cotizar()">Cotizar</button>
<div id="resultado"></div>
</div>
</div>

<div class="col-md-4" id="statsPanel">
<div class="card p-3">
<h5>Estadisticas</h5>
<p>Vendidas: <span id="vendidos"></span></p>
<p>Stock: <span id="stock"></span></p>
<button onclick="exportarExcel()">Excel</button>
<button onclick="exportarPDF()">PDF</button>
</div>
</div>

<div class="col-md-4" id="adminPanel">
<div class="card p-3">
<h5>Admin</h5>
<input id="nuevoServicio" placeholder="Servicio">
<input id="precioServicio" type="number" placeholder="Precio">
<button onclick="agregarServicio()">Agregar</button>
</div>
</div>

<div class="col-12 mt-3">
<div class="card p-3">
<h5>Historial</h5>
<ul id="historial"></ul>
</div>
</div>

</div>
</div>

<script src="js/cotizador.js"></script>
<script src="js/app.js"></script>
</body>
</html>
